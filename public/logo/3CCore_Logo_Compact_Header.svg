<svg width="420" height="72" viewBox="0 0 420 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"  stop-opacity="1"/>
      <stop offset="35%"  stop-color="#aaf0ff"  stop-opacity="0.95"/>
      <stop offset="70%"  stop-color="#00b8e6"  stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a6fc4"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iconAmbient" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0d2a52"  stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#050d1a"  stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient glow behind icon -->
  <circle cx="36" cy="36" r="34" fill="url(#iconAmbient)"/>

  <!-- Outer ring -->
  <circle cx="36" cy="36" r="30" fill="none" stroke="#1a5090" stroke-width="0.7" opacity="0.55"/>
  <circle cx="36" cy="36" r="26" fill="none" stroke="#1a5090" stroke-width="0.35" opacity="0.3"/>

  <!-- Circuit lines LEFT -->
  <line x1="6"  y1="36" x2="0"  y2="36" stroke="#00ccff" stroke-width="0.85" opacity="0.75"/>
  <line x1="6"  y1="36" x2="1"  y2="28" stroke="#00ccff" stroke-width="0.7"  opacity="0.5"/>
  <circle cx="1" cy="28" r="1.4" fill="#00ccff" opacity="0.55"/>
  <line x1="6"  y1="36" x2="1"  y2="44" stroke="#00ccff" stroke-width="0.7"  opacity="0.5"/>
  <circle cx="1" cy="44" r="1.4" fill="#00ccff" opacity="0.45"/>

  <!-- Circuit lines RIGHT -->
  <line x1="66" y1="36" x2="72" y2="36" stroke="#00ccff" stroke-width="0.85" opacity="0.75"/>
  <line x1="66" y1="36" x2="71" y2="28" stroke="#00ccff" stroke-width="0.7"  opacity="0.5"/>
  <circle cx="71" cy="28" r="1.4" fill="#00ccff" opacity="0.55"/>
  <line x1="66" y1="36" x2="71" y2="44" stroke="#00ccff" stroke-width="0.7"  opacity="0.5"/>
  <circle cx="71" cy="44" r="1.4" fill="#00ccff" opacity="0.45"/>

  <!-- Circuit lines TOP -->
  <line x1="28" y1="8"  x2="22" y2="2"  stroke="#00ccff" stroke-width="0.65" opacity="0.45"/>
  <circle cx="22" cy="2"  r="1.2" fill="#00ccff" opacity="0.45"/>
  <line x1="44" y1="8"  x2="50" y2="2"  stroke="#00ccff" stroke-width="0.65" opacity="0.45"/>
  <circle cx="50" cy="2"  r="1.2" fill="#00ccff" opacity="0.45"/>

  <!-- ── PROPERTY / BUILDING ICON (replaces heart) ── -->

  <!-- Building base body -->
  <rect x="20" y="32" width="32" height="28" rx="1"
        fill="none" stroke="#2a7fd4" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Building shimmer overlay -->
  <rect x="20" y="32" width="32" height="28" rx="1"
        fill="none" stroke="#6ab4e8" stroke-width="0.9"
        stroke-dasharray="4 60" stroke-dashoffset="-5" opacity="0.55"/>

  <!-- Roofline / gable peak -->
  <polyline points="16,33 36,14 56,33"
            fill="none" stroke="#2a7fd4" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Roof shimmer -->
  <polyline points="16,33 36,14 56,33"
            fill="none" stroke="#6ab4e8" stroke-width="1.0"
            stroke-dasharray="4 70" stroke-dashoffset="-6" opacity="0.55"/>

  <!-- Chimney / spire detail -->
  <rect x="33" y="10" width="6" height="7" rx="0.5"
        fill="none" stroke="#1a5fa8" stroke-width="1.5" opacity="0.8"/>

  <!-- Door (center bottom) -->
  <rect x="31" y="46" width="10" height="14" rx="1"
        fill="none" stroke="#00ccff" stroke-width="1.4" opacity="0.7"/>
  <!-- Door knob -->
  <circle cx="39" cy="53" r="1" fill="#00ccff" opacity="0.6"/>

  <!-- Windows row 1 -->
  <rect x="23" y="36" width="7" height="6" rx="0.5"
        fill="none" stroke="#6ab4e8" stroke-width="1.2" opacity="0.75"/>
  <rect x="42" y="36" width="7" height="6" rx="0.5"
        fill="none" stroke="#6ab4e8" stroke-width="1.2" opacity="0.75"/>

  <!-- Window glow nodes (circuit nodes inside windows) -->
  <circle cx="26.5" cy="39" r="1.5" fill="#00ccff" opacity="0.65" filter="url(#glow)"/>
  <circle cx="45.5" cy="39" r="1.5" fill="#00ccff" opacity="0.65" filter="url(#glow)"/>

  <!-- Core glow at roof peak -->
  <circle cx="36" cy="14" r="9" fill="url(#coreGlow)" opacity="0.3"/>
  <circle cx="36" cy="14" r="4.5" fill="#071224"/>
  <circle cx="36" cy="14" r="3"   fill="#00b8e6" opacity="0.85"/>
  <circle cx="36" cy="14" r="1.8" fill="#aaf0ff" opacity="0.95"/>
  <circle cx="36" cy="14" r="0.9" fill="#ffffff"/>

  <!-- Divider line -->
  <line x1="82" y1="16" x2="82" y2="56" stroke="#1e3a5f" stroke-width="0.8" opacity="0.7"/>

  <!-- Wordmark: "3C" bold -->
  <text x="96" y="34"
        font-family="Montserrat, 'Arial Black', sans-serif"
        font-size="26" font-weight="700" fill="#ffffff" letter-spacing="1">3C</text>

  <!-- Wordmark: " CORE" light -->
  <text x="128" y="34"
        font-family="Montserrat, Arial, sans-serif"
        font-size="26" font-weight="300" fill="#6ab4e8" letter-spacing="0.5"> CORE</text>

  <!-- Divider line between wordmark and tagline -->
  <line x1="96" y1="40" x2="280" y2="40" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="96" y="54"
        font-family="Inter, Arial, sans-serif"
        font-size="8" font-weight="400" fill="#4a90c4" letter-spacing="2.4">CONNECTED · CONSISTENT · CONFIDENT</text>
</svg>
