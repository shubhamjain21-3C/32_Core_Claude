<svg width="420" height="72" viewBox="0 0 420 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"  stop-opacity="1"/>
      <stop offset="35%"  stop-color="#aaf0ff"  stop-opacity="0.95"/>
      <stop offset="70%"  stop-color="#00b8e6"  stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a6fc4"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iconAmbient" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0d2a52"  stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#050d1a"  stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background (transparent for PNG export, or uncomment for dark bg) -->
  <!-- <rect width="420" height="72" fill="#050d1a"/> -->

  <!-- Ambient glow behind icon -->
  <circle cx="36" cy="36" r="32" fill="url(#iconAmbient)"/>

  <!-- Outer ring -->
  <circle cx="36" cy="36" r="28" fill="none" stroke="#1a5090" stroke-width="0.7" opacity="0.55"/>
  <circle cx="36" cy="36" r="24" fill="none" stroke="#1a5090" stroke-width="0.35" opacity="0.3"/>

  <!-- Circuit lines LEFT -->
  <line x1="8"  y1="36" x2="0"  y2="36" stroke="#00ccff" stroke-width="0.85" opacity="0.75"/>
  <circle cx="0" cy="36" r="0" fill="none"/>
  <line x1="8"  y1="36" x2="2"  y2="28" stroke="#00ccff" stroke-width="0.7"  opacity="0.5"/>
  <circle cx="2" cy="28" r="1.4" fill="#00ccff" opacity="0.55"/>
  <line x1="8"  y1="36" x2="2"  y2="44" stroke="#00ccff" stroke-width="0.7"  opacity="0.5"/>
  <circle cx="2" cy="44" r="1.4" fill="#00ccff" opacity="0.45"/>

  <!-- Circuit lines RIGHT -->
  <line x1="64" y1="36" x2="72" y2="36" stroke="#00ccff" stroke-width="0.85" opacity="0.75"/>
  <line x1="64" y1="36" x2="70" y2="28" stroke="#00ccff" stroke-width="0.7"  opacity="0.5"/>
  <circle cx="70" cy="28" r="1.4" fill="#00ccff" opacity="0.55"/>
  <line x1="64" y1="36" x2="70" y2="44" stroke="#00ccff" stroke-width="0.7"  opacity="0.5"/>
  <circle cx="70" cy="44" r="1.4" fill="#00ccff" opacity="0.45"/>

  <!-- Circuit lines TOP -->
  <line x1="28" y1="14" x2="22" y2="6"  stroke="#00ccff" stroke-width="0.65" opacity="0.45"/>
  <circle cx="22" cy="6"  r="1.2" fill="#00ccff" opacity="0.45"/>
  <line x1="44" y1="14" x2="50" y2="6"  stroke="#00ccff" stroke-width="0.65" opacity="0.45"/>
  <circle cx="50" cy="6"  r="1.2" fill="#00ccff" opacity="0.45"/>

  <!-- Heart-infinity left lobe -->
  <path d="M36,58 C20,44 4,40 4,24 C4,12 14,6 24,12 C29,15 33,22 36,30"
        fill="none" stroke="#2a7fd4" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left lobe shimmer -->
  <path d="M36,58 C20,44 4,40 4,24 C4,12 14,6 24,12 C29,15 33,22 36,30"
        fill="none" stroke="#6ab4e8" stroke-width="1.1" stroke-linecap="round"
        stroke-dasharray="5 60" stroke-dashoffset="-8" opacity="0.6"/>

  <!-- Heart-infinity right lobe -->
  <path d="M36,58 C52,44 68,40 68,24 C68,12 58,6 48,12 C43,15 39,22 36,30"
        fill="none" stroke="#2a7fd4" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right lobe shimmer -->
  <path d="M36,58 C52,44 68,40 68,24 C68,12 58,6 48,12 C43,15 39,22 36,30"
        fill="none" stroke="#6ab4e8" stroke-width="1.1" stroke-linecap="round"
        stroke-dasharray="5 60" stroke-dashoffset="-8" opacity="0.6"/>

  <!-- Top arch -->
  <path d="M24,12 C28,0 44,0 48,12"
        fill="none" stroke="#1a5fa8" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- Core glow layers -->
  <circle cx="36" cy="30" r="12" fill="url(#coreGlow)" opacity="0.35"/>
  <circle cx="36" cy="30" r="7"  fill="#071224"/>
  <circle cx="36" cy="30" r="5"  fill="#00b8e6" opacity="0.85"/>
  <circle cx="36" cy="30" r="3"  fill="#aaf0ff" opacity="0.95"/>
  <circle cx="36" cy="30" r="1.5" fill="#ffffff"/>

  <!-- Divider line -->
  <line x1="82" y1="16" x2="82" y2="56" stroke="#1e3a5f" stroke-width="0.8" opacity="0.7"/>

  <!-- Wordmark: "3C" bold -->
  <text x="96" y="34"
        font-family="Montserrat, 'Arial Black', sans-serif"
        font-size="26" font-weight="700" fill="#ffffff" letter-spacing="1">3C</text>

  <!-- Wordmark: " CORE" light -->
  <text x="128" y="34"
        font-family="Montserrat, Arial, sans-serif"
        font-size="26" font-weight="300" fill="#6ab4e8" letter-spacing="0.5"> CORE</text>

  <!-- Divider line between wordmark and tagline -->
  <line x1="96" y1="40" x2="280" y2="40" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="96" y="54"
        font-family="Inter, Arial, sans-serif"
        font-size="8" font-weight="400" fill="#4a90c4" letter-spacing="2.4">CONNECTED · CONSISTENT · CONFIDENT</text>
</svg>
